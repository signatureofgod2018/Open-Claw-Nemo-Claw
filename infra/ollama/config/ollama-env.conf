# Ollama Environment Configuration for ST-Gabriel
# Applied via systemd override: /etc/systemd/system/ollama.service.d/

# AMD RX 6900 XT (RDNA 2 / gfx1030) ROCm compatibility
HSA_OVERRIDE_GFX_VERSION=10.3.0

# Ollama server settings
OLLAMA_HOST=127.0.0.1:11434
OLLAMA_NUM_PARALLEL=2
OLLAMA_MAX_QUEUE=64
OLLAMA_KEEP_ALIVE=15m
OLLAMA_MAX_LOADED_MODELS=1

# Debug logging (enable for troubleshooting, disable for production)
# OLLAMA_DEBUG=1
