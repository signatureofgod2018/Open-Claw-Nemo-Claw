# Fluent Bit — lightweight log collector for each machine
# Parses OpenClaw Gateway and NemoClaw logs into structured telemetry

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# OpenClaw Gateway stdout/stderr
[INPUT]
    Name          tail
    Path          /var/log/openclaw/gateway.log
    Tag           openclaw.gateway
    Parser        json
    Refresh_Interval 5

# NemoClaw audit trail
[INPUT]
    Name          tail
    Path          /var/log/nemoclaw/audit.log
    Tag           nemoclaw.audit
    Parser        json
    Refresh_Interval 5

# NemoClaw policy violations
[INPUT]
    Name          tail
    Path          /var/log/nemoclaw/violations.log
    Tag           nemoclaw.violations
    Parser        json
    Refresh_Interval 2

# System metrics (CPU, memory, disk for sandbox health)
[INPUT]
    Name          cpu
    Tag           system.cpu
    Interval_Sec  10

[INPUT]
    Name          mem
    Tag           system.memory
    Interval_Sec  10

# Add machine identity
[FILTER]
    Name          modify
    Match         *
    Add           machine ${MACHINE_ID}

# Tag security events with risk level
[FILTER]
    Name          lua
    Match         nemoclaw.violations
    Script        /etc/fluent-bit/scripts/tag-risk-level.lua
    Call          tag_risk_level

# Forward to OTel Collector (local or remote ST-Gabriel)
[OUTPUT]
    Name          opentelemetry
    Match         *
    Host          ${OTEL_COLLECTOR_HOST}
    Port          4317
    Tls           On
    Tls.verify    On
    Tls.ca_file   /etc/fluent-bit/tls/ca.crt
    Tls.crt_file  /etc/fluent-bit/tls/client.crt
    Tls.key_file  /etc/fluent-bit/tls/client.key
