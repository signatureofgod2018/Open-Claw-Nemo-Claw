# Prometheus Alerting Rules — maps to OWASP Agentic Top 10 gaps
# See ai-workspace/security-assessment.md for full gap analysis

groups:
  - name: gateway_health
    interval: 30s
    rules:
      - alert: GatewayDown
        expr: up{job="openclaw-gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OpenClaw Gateway is down on {{ $labels.machine }}"

      - alert: HighErrorRate
        expr: rate(openclaw_gateway_error_total[5m]) > 0.1
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "High error rate on {{ $labels.machine }} Gateway"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(openclaw_gateway_latency_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: medium
        annotations:
          summary: "P95 latency > 5s on {{ $labels.machine }}"

  - name: security_brute_force
    interval: 15s
    rules:
      # ClawJacked attack detection — CVE-2026-25253
      - alert: AuthBruteForce
        expr: rate(openclaw_gateway_auth_failures_total[1m]) > 10
        for: 30s
        labels:
          severity: critical
          owasp: ASI03
        annotations:
          summary: "Possible brute force attack on {{ $labels.machine }} (>10 auth failures/min)"
          reference: "ClawJacked — oasis.security/blog/openclaw-vulnerability"

  - name: security_rogue_agent
    interval: 15s
    rules:
      # Clawdrain / Rogue agent detection — OWASP ASI10
      - alert: ToolInvocationBurst
        expr: rate(openclaw_agent_tool_invocation_total[1m]) > 10 * avg_over_time(openclaw_agent_tool_invocation_total[1h])
        for: 1m
        labels:
          severity: critical
          owasp: ASI10
        annotations:
          summary: "Agent {{ $labels.agent_id }} tool invocation rate 10x above baseline"
          reference: "Clawdrain — arXiv 2603.00902"

      - alert: UnusualToolUsage
        expr: openclaw_agent_tool_invocation_total{tool!~"read|grep|glob"} unless openclaw_agent_tool_baseline
        for: 0s
        labels:
          severity: high
          owasp: ASI02
        annotations:
          summary: "Agent {{ $labels.agent_id }} invoked unusual tool: {{ $labels.tool }}"

  - name: security_memory_poisoning
    interval: 15s
    rules:
      # Memory poisoning detection — OWASP ASI06
      - alert: MemoryWriteFlood
        expr: rate(openclaw_agent_memory_write_total[5m]) > 10
        for: 1m
        labels:
          severity: high
          owasp: ASI06
        annotations:
          summary: "Agent {{ $labels.agent_id }} writing to memory at unusual rate"
          reference: "MINJA — >95% injection success rate"

      - alert: InstructionInMemory
        expr: openclaw_agent_memory_write_content_flags_total > 0
        for: 0s
        labels:
          severity: critical
          owasp: ASI06
        annotations:
          summary: "Instruction-like content detected in agent {{ $labels.agent_id }} memory write"

  - name: security_exfiltration
    interval: 15s
    rules:
      # Data exfiltration detection
      - alert: NetworkRequestToUnknownHost
        expr: openclaw_agent_network_request_total{host!~"api.anthropic.com|api.openai.com|localhost"} > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Agent {{ $labels.agent_id }} made request to unlisted host: {{ $labels.host }}"

      - alert: NetworkBurst
        expr: rate(openclaw_agent_network_request_total[1m]) > 5 * avg_over_time(openclaw_agent_network_request_total[1h])
        for: 1m
        labels:
          severity: high
        annotations:
          summary: "Agent {{ $labels.agent_id }} network request rate 5x above baseline"

  - name: security_sandbox
    interval: 15s
    rules:
      # Sandbox escape detection
      - alert: SandboxViolationSpike
        expr: rate(nemoclaw_sandbox_violation_total[5m]) > 1
        for: 1m
        labels:
          severity: high
        annotations:
          summary: "Sandbox violations spiking on {{ $labels.machine }}"

      - alert: SandboxEscapeAttempt
        expr: nemoclaw_sandbox_escape_attempt_total > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Possible sandbox escape attempt on {{ $labels.machine }}"
          reference: "TOCTOU race — ~25% success rate"

  - name: security_transport
    interval: 15s
    rules:
      # Inter-machine transport — OWASP ASI07
      - alert: TransportAuthFailure
        expr: openclaw_transport_auth_failure_total > 0
        for: 0s
        labels:
          severity: critical
          owasp: ASI07
        annotations:
          summary: "mTLS authentication failure on ST-Gabriel <-> Maria transport"

  - name: security_supply_chain
    interval: 30s
    rules:
      # Supply chain — OWASP ASI04
      - alert: UnauditedSkillExecution
        expr: openclaw_skill_invocation_total{source!="allowlist"} > 0
        for: 0s
        labels:
          severity: critical
          owasp: ASI04
        annotations:
          summary: "Unaudited skill '{{ $labels.skill }}' executed on {{ $labels.machine }}"
          reference: "36.82% of ClawHub skills have flaws — Snyk ToxicSkills"

  # ================================================================
  # BEHAVIORAL CANARIES
  # "Hacks reveal themselves in silly things" — performance drift,
  # package bloat, dormant activations, network latency shifts.
  # These are not security events. They are the smoke before the fire.
  # ================================================================

  - name: canary_performance_drift
    interval: 30s
    rules:
      # The XZ Utils signal — latency increase without explanation
      - alert: GatewayLatencyDrift
        expr: |
          (openclaw_gateway_latency_ms - openclaw_gateway_latency_ms_baseline)
          / openclaw_gateway_latency_ms_stddev > 3
        for: 5m
        labels:
          severity: high
          canary: performance
        annotations:
          summary: "Gateway latency on {{ $labels.machine }} is >3σ above baseline"
          context: "The XZ Utils backdoor was caught because SSH was 500ms slower. Investigate any unexplained latency increase."

      - alert: ResponseTimeDegradation
        expr: histogram_quantile(0.99, rate(openclaw_gateway_latency_seconds_bucket[5m])) > 2 * histogram_quantile(0.99, rate(openclaw_gateway_latency_seconds_bucket[1h]))
        for: 10m
        labels:
          severity: medium
          canary: performance
        annotations:
          summary: "P99 response time doubled on {{ $labels.machine }} in the last 10 minutes"

      - alert: CPUAnomalyNoExplanation
        expr: system_cpu_percent > 80 unless on(machine) (rate(openclaw_agent_tool_invocation_total[5m]) > 1)
        for: 5m
        labels:
          severity: high
          canary: resource
        annotations:
          summary: "High CPU on {{ $labels.machine }} with no corresponding agent activity — unexplained load"

      - alert: MemoryCreep
        expr: delta(system_memory_used_mb[1h]) > 100 and system_memory_used_mb / system_memory_total_mb > 0.8
        for: 10m
        labels:
          severity: medium
          canary: resource
        annotations:
          summary: "Memory growing steadily on {{ $labels.machine }} — possible leak or hidden process"

      - alert: DiskGrowthAnomaly
        expr: predict_linear(system_disk_used_mb[6h], 24*3600) > system_disk_total_mb * 0.95
        for: 30m
        labels:
          severity: medium
          canary: resource
        annotations:
          summary: "Disk on {{ $labels.machine }} predicted to hit 95% within 24h at current growth rate"

      - alert: FileDescriptorSurge
        expr: system_open_file_descriptors > 2 * avg_over_time(system_open_file_descriptors[1d])
        for: 5m
        labels:
          severity: medium
          canary: resource
        annotations:
          summary: "Open file descriptors doubled on {{ $labels.machine }} — investigate"

  - name: canary_network_behavior
    interval: 30s
    rules:
      - alert: NetworkLatencySpike
        expr: openclaw_network_latency_ms > 2 * openclaw_network_latency_baseline_ms
        for: 5m
        labels:
          severity: medium
          canary: network
        annotations:
          summary: "Network latency to {{ $labels.target_host }} doubled on {{ $labels.machine }}"

      - alert: NewDNSResolution
        expr: openclaw_dns_first_seen_total > 0
        for: 0s
        labels:
          severity: medium
          canary: network
        annotations:
          summary: "New DNS resolution observed on {{ $labels.machine }}: {{ $labels.query_name }} → {{ $labels.resolved_ip }}"

      - alert: DNSResolutionChanged
        expr: openclaw_dns_ip_changed_total > 0
        for: 0s
        labels:
          severity: high
          canary: network
        annotations:
          summary: "DNS resolution changed for {{ $labels.query_name }} on {{ $labels.machine }} — possible DNS hijack"

      - alert: NewOutboundConnection
        expr: increase(system_network_connections_established[5m]) > 3 * avg_over_time(system_network_connections_established[1d])
        for: 5m
        labels:
          severity: medium
          canary: network
        annotations:
          summary: "Outbound connections tripled on {{ $labels.machine }}"

      - alert: PacketLossIncrease
        expr: openclaw_network_packet_loss_pct > 5
        for: 5m
        labels:
          severity: medium
          canary: network
        annotations:
          summary: "Packet loss >5% to {{ $labels.target_host }} — network degradation"

  - name: canary_package_supply_chain
    interval: 60s
    rules:
      # The dormant package problem — installed but never used... until it is
      - alert: DormantPackageActivated
        expr: openclaw_package_first_activation_total > 0
        for: 0s
        labels:
          severity: high
          canary: supply_chain
        annotations:
          summary: "Previously dormant package '{{ $labels.package_name }}' just activated on {{ $labels.machine }}"
          context: "Packages installed but never used are a sleeper attack vector. Investigate why it activated now."

      - alert: PackageSizeIncrease
        expr: openclaw_package_size_delta_bytes > 100000
        for: 0s
        labels:
          severity: medium
          canary: supply_chain
        annotations:
          summary: "Package '{{ $labels.package_name }}' grew by {{ $value }} bytes on {{ $labels.machine }}"
          context: "Unexpected size increases can indicate injected payloads."

      - alert: PackageMaintainerChange
        expr: openclaw_package_maintainer_change_total > 0
        for: 0s
        labels:
          severity: high
          canary: supply_chain
        annotations:
          summary: "Maintainer changed for package '{{ $labels.package_name }}'"
          context: "Maintainer takeover is the XZ Utils attack vector. Investigate immediately."

      - alert: NewInstallScriptDetected
        expr: openclaw_package_install_script_added_total > 0
        for: 0s
        labels:
          severity: critical
          canary: supply_chain
        annotations:
          summary: "Install script added to package '{{ $labels.package_name }}' on {{ $labels.machine }}"
          context: "postinstall scripts are the primary npm supply chain attack vector."

  - name: canary_process_anomaly
    interval: 30s
    rules:
      - alert: NewProcessDetected
        expr: openclaw_process_first_seen_total > 0
        for: 0s
        labels:
          severity: medium
          canary: process
        annotations:
          summary: "New process '{{ $labels.process_name }}' detected on {{ $labels.machine }}"
          context: "Unexpected processes may indicate compromise. Verify this is expected."

      - alert: UnexpectedListeningPort
        expr: delta(system_network_connections_listening[5m]) > 0
        for: 1m
        labels:
          severity: high
          canary: process
        annotations:
          summary: "New listening port opened on {{ $labels.machine }}"
          context: "Backdoors often open new listening ports. Investigate immediately."
