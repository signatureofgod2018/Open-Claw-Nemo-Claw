# OpenTelemetry Collector — aggregates telemetry from ST-Gabriel and Maria
# Receives from local and remote Fluent Bit instances, exports to Prometheus + Loki

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
        tls:
          cert_file: /etc/otel/tls/server.crt
          key_file: /etc/otel/tls/server.key
          ca_file: /etc/otel/tls/ca.crt
          client_ca_file: /etc/otel/tls/ca.crt  # mTLS — require client cert
      http:
        endpoint: "0.0.0.0:4318"

  # Receive structured logs from Fluent Bit
  fluentforward:
    endpoint: "0.0.0.0:8006"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Add machine identity to all telemetry
  resource:
    attributes:
      - key: deployment.environment
        value: "open-claw-nemo-claw"
        action: upsert

  # Filter sensitive data before export
  filter:
    logs:
      exclude:
        match_type: regexp
        bodies:
          - ".*api[_-]?key.*"
          - ".*password.*"
          - ".*secret.*"
          - ".*token.*"

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "openclaw"

  loki:
    endpoint: "http://localhost:3100/loki/api/v1/push"
    labels:
      attributes:
        machine: ""
        agent_id: ""
        event_type: ""
        risk_level: ""

  # Debug exporter for development
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus]

    logs:
      receivers: [otlp, fluentforward]
      processors: [batch, resource, filter]
      exporters: [loki, debug]
