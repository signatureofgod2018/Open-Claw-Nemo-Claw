# Anomaly Detection Rules
# Maps directly to OWASP Agentic Top 10 and security-assessment.md guardrails

version: "1.0"

rules:
  # === OWASP ASI10: Rogue Agent / Clawdrain ===
  - id: tool-burst
    description: "Agent tool invocation rate exceeds 10x baseline in 60s window"
    condition: "agent_tool_invocation_rate > 10x_baseline_60s"
    severity: critical
    owasp: ASI10
    action: halt-agent
    reference: "Clawdrain — arXiv 2603.00902"

  # === OWASP ASI02: Confused Deputy ===
  - id: unusual-tool
    description: "Agent invokes tool outside its typical usage pattern"
    condition: "tool not in agent_tool_baseline_set"
    severity: high
    owasp: ASI02
    action: alert-and-log
    reference: "Asana MCP confused deputy incident"

  # === OWASP ASI06: Memory Poisoning ===
  - id: memory-flood
    description: "Agent writes to memory >50 times in 5 minutes"
    condition: "agent_memory_write_total > 50 in 300s"
    severity: high
    owasp: ASI06
    action: alert-and-log

  - id: instruction-in-memory
    description: "Memory write contains instruction-like patterns"
    condition: "memory_content matches instruction_patterns"
    severity: critical
    owasp: ASI06
    action: halt-agent-and-quarantine-memory
    reference: "MINJA — >95% injection success rate"

  # === Data Exfiltration ===
  - id: network-unknown-host
    description: "Agent makes request to host not in allowlist"
    condition: "request_host not in network_allowlist"
    severity: critical
    action: block-and-alert
    reference: "Simon Willison Lethal Trifecta"

  - id: network-burst
    description: "Agent network request rate exceeds 5x baseline in 60s"
    condition: "agent_network_request_rate > 5x_baseline_60s"
    severity: high
    action: alert-and-throttle

  # === Authentication ===
  - id: auth-brute-force
    description: "More than 10 auth failures in 60 seconds"
    condition: "gateway_auth_failures > 10 in 60s"
    severity: critical
    action: block-source-ip
    reference: "ClawJacked — CVE-2026-25253"

  # === Sandbox ===
  - id: sandbox-violation-spike
    description: "More than 5 sandbox violations in 5 minutes"
    condition: "nemoclaw_sandbox_violations > 5 in 300s"
    severity: high
    action: alert-and-log
    reference: "TOCTOU race condition — ~25% success"

  - id: sandbox-escape-attempt
    description: "Any sandbox escape signal detected"
    condition: "nemoclaw_sandbox_escape_signal > 0"
    severity: critical
    action: halt-sandbox-and-alert

  # === Inter-Machine Transport (OWASP ASI07) ===
  - id: transport-auth-failure
    description: "mTLS authentication failure on ST-Gabriel <-> Maria link"
    condition: "transport_auth_failure > 0"
    severity: critical
    owasp: ASI07
    action: block-transport-and-alert

  # === Supply Chain (OWASP ASI04) ===
  - id: unaudited-skill
    description: "Skill executed that is not in curated allowlist"
    condition: "skill_source != 'allowlist'"
    severity: critical
    owasp: ASI04
    action: block-and-alert
    reference: "36.82% of ClawHub skills have flaws — Snyk ToxicSkills"

  # =============================================================
  # BEHAVIORAL CANARIES
  # "Hacks reveal themselves in silly things"
  # These are NOT security events — they are the smoke before fire
  # =============================================================

  # === Performance Drift (the XZ Utils signal) ===
  - id: latency-drift
    description: "Gateway or network latency >3σ above baseline for 5+ minutes"
    condition: "metric_value > baseline_mean + 3 * baseline_stddev for 300s"
    severity: high
    action: alert-and-investigate
    reference: "XZ Utils (CVE-2024-3094) — caught because SSH was 500ms slower"

  - id: cpu-no-explanation
    description: "CPU >80% with no corresponding agent activity"
    condition: "cpu_percent > 80 AND agent_tool_invocation_rate < 1"
    severity: high
    action: alert-and-investigate

  - id: memory-creep
    description: "Memory growing >100MB/hour while above 80% utilization"
    condition: "memory_delta_1h > 100MB AND memory_percent > 80"
    severity: medium
    action: alert-and-log

  - id: disk-prediction
    description: "Disk predicted to hit 95% within 24 hours"
    condition: "predict_linear(disk_used, 24h) > disk_total * 0.95"
    severity: medium
    action: alert-and-log

  - id: file-descriptor-surge
    description: "Open file descriptors doubled vs. daily average"
    condition: "open_fds > 2 * avg_fds_24h"
    severity: medium
    action: alert-and-investigate

  # === Network Behavioral Canaries ===
  - id: new-dns-resolution
    description: "DNS resolution for a domain never seen before"
    condition: "dns_query_first_seen = true"
    severity: medium
    action: alert-and-log

  - id: dns-ip-changed
    description: "DNS resolution for known domain returned different IP"
    condition: "dns_ip_changed = true"
    severity: high
    action: alert-and-investigate
    reference: "DNS hijacking is a common pivot technique"

  - id: network-latency-spike
    description: "Network latency to known host doubled"
    condition: "latency_ms > 2 * baseline_latency_ms for 300s"
    severity: medium
    action: alert-and-log

  - id: packet-loss
    description: "Packet loss >5% sustained"
    condition: "packet_loss_pct > 5 for 300s"
    severity: medium
    action: alert-and-log

  - id: new-listening-port
    description: "New listening port opened on machine"
    condition: "delta(listening_connections, 5m) > 0"
    severity: high
    action: alert-and-investigate
    reference: "Backdoors often open new listening ports"

  # === Package Supply Chain Canaries ===
  - id: dormant-package-activated
    description: "Package that was never used just got activated for the first time"
    condition: "package_first_activation = true"
    severity: high
    action: alert-and-investigate
    reference: "Sleeper packages activate on trigger — investigate timing and invoker"

  - id: package-size-increase
    description: "Package size increased by >100KB between versions"
    condition: "package_size_delta > 100000"
    severity: medium
    action: alert-and-log
    reference: "Size inflation can indicate injected payloads"

  - id: package-maintainer-change
    description: "Package maintainer changed"
    condition: "package_maintainer_changed = true"
    severity: high
    action: alert-and-investigate
    reference: "XZ Utils — maintainer takeover was the attack vector"

  - id: install-script-added
    description: "postinstall or preinstall script added to a package"
    condition: "package_install_script_added = true"
    severity: critical
    action: block-and-alert
    reference: "Install scripts are the #1 npm supply chain attack vector"

  # === Process Canaries ===
  - id: new-process
    description: "New process appeared that was never seen before on this machine"
    condition: "process_first_seen = true"
    severity: medium
    action: alert-and-log

  - id: outbound-connection-surge
    description: "Outbound connections tripled vs. daily average"
    condition: "established_connections > 3 * avg_connections_24h"
    severity: medium
    action: alert-and-investigate

# Instruction patterns for memory poisoning detection
instruction_patterns:
  - "ignore previous"
  - "disregard.*instructions"
  - "you are now"
  - "system prompt"
  - "\\[INST\\]"
  - "<\\|im_start\\|>"
  - "do not reveal"
  - "act as if"
  - "pretend you"
  - "override.*policy"

# Actions
actions:
  halt-agent:
    description: "Immediately stop the agent and alert operator"
  alert-and-log:
    description: "Log the event and send alert, agent continues"
  block-and-alert:
    description: "Block the action and alert operator"
  halt-sandbox-and-alert:
    description: "Stop the NemoClaw sandbox and alert operator"
  block-source-ip:
    description: "Block the source IP and alert operator"
  block-transport-and-alert:
    description: "Halt inter-machine transport and alert operator"
  alert-and-throttle:
    description: "Alert and apply rate limiting to the agent"
  halt-agent-and-quarantine-memory:
    description: "Stop agent, quarantine memory store for manual review"
  alert-and-investigate:
    description: "Alert operator, flag for manual investigation, continue operation"
